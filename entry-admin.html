<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Entry Admin</title><link rel="stylesheet" href="style.css?v=20260722-noworker"></head><body><header class="site-header"><div class="header-inner analytics-header"><div><div class="eyebrow">APDC ENTRY MANAGEMENT</div><h1>ENTRY ADMIN</h1></div><a href="index.html" class="admin-home-link">SEARCH</a></div></header><main class="container admin-shell"><section id="loginBox" class="analytics-login"><div class="small-label">ADMIN ACCESS</div><h2>ENTER PASSWORD</h2><label>PASSWORD</label><input id="password" type="password" placeholder="Password"><button id="loginBtn">ENTER</button><div id="loginMsg" class="message"></div></section><section id="adminBox" class="hidden"><div class="admin-toolbar"><button id="loadBase">LOAD CURRENT DATA</button><button id="newPlayer">NEW PLAYER</button><button id="saveAll" class="primary">SAVE ENTRIES</button><a href="version-history.html">VERSION HISTORY</a></div><div id="sessionInfo" class="status-line"></div><div id="status" class="status-line"></div><div class="admin-grid2"><div class="admin-card"><input id="filter" placeholder="Search back no. or name"><div id="playerList" class="admin-list"></div></div><div class="admin-card"><label>BACK NO.</label><input id="backNo"><label>COMPETITOR NAME</label><input id="competitor"><div class="admin-toolbar"><button id="addEntry">ADD ENTRY</button><button id="deletePlayer">DELETE PLAYER</button></div><div id="entryRows"></div></div></div><p class="protected-note">Each save creates a restore point. The latest 10 versions are retained. Entry changes update APDC Search only.</p></section></main><script type="module" src="entry-admin.js?v=20260722-noworker"></script></body></html>
