<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>APDC Entry Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <div class="brand-row">
      <div>
        <div class="eyebrow">2026 ASIA PACIFIC DANCESPORT CHAMPIONSHIP</div>
        <h1>APDC ENTRY SEARCH</h1>
      </div>
      <button id="menuBtn" class="menu-btn" type="button" aria-label="Open menu">MENU</button>
    </div>
  </div>
</header>

<main class="container">
  <section class="search-block">
    <form id="searchForm" class="search-form">
      <input
        id="query"
        type="search"
        inputmode="search"
        autocomplete="off"
        placeholder="Search by back number, name or event"
        aria-label="Search"
      >
      <button class="search-btn" type="submit">SEARCH</button>
      <button id="resetBtn" class="reset-btn" type="button">RESET</button>
    </form>
  </section>

  <section id="searchBox" class="search-results hidden">
    <div class="section-title-row">
      <h2 id="searchTitle">SEARCH RESULTS</h2>
      <span id="searchCount"></span>
    </div>
    <div id="searchResults"></div>
  </section>

  <section class="event-browser">
    <div class="section-title-row">
      <h2>FULL EVENT LIST</h2>
      <span id="eventSummary"></span>
    </div>

    <div id="sectionTabs" class="section-tabs"></div>
    <div id="eventList" class="event-list"></div>
  </section>
</main>

<div id="menuPanel" class="side-panel hidden">
  <div class="panel-backdrop" data-close-panel></div>
  <div class="panel-content">
    <div class="panel-header">
      <h2>APDC MENU</h2>
      <button id="closePanelBtn" class="close-btn" type="button">×</button>
    </div>
    <button class="panel-link" type="button" data-view="information">INFORMATION</button>
    <button class="panel-link" type="button" data-view="directions">DIRECTIONS</button>
  </div>
</div>

<div id="infoModal" class="modal hidden">
  <div class="modal-backdrop" data-close-modal></div>
  <div class="modal-card">
    <button class="modal-close" type="button" data-close-modal>×</button>
    <div id="infoContent"></div>
  </div>
</div>

<div id="playerModal" class="modal hidden">
  <div class="modal-backdrop" data-close-player></div>
  <div class="modal-card">
    <button class="modal-close" type="button" data-close-player>×</button>
    <div id="playerContent"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
