<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>APDC Entry Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="eyebrow">2026 ASIA PACIFIC DANCESPORT CHAMPIONSHIP</div>
      <h1>APDC ENTRY SEARCH</h1>
      <p>백넘버·선수명·이벤트를 검색하세요.</p>
    </div>
  </header>

  <main class="container">
    <section class="search-panel">
      <form id="searchForm" class="search-form">
        <label class="sr-only" for="query">검색어</label>
        <input
          id="query"
          type="search"
          inputmode="search"
          autocomplete="off"
          placeholder="예: 31, Yul BAEK, Under 12"
        >
        <button type="submit" class="btn btn-primary">검색</button>
        <button type="button" id="resetBtn" class="btn btn-secondary">초기화</button>
      </form>

      <div class="filters">
        <select id="sectionFilter" aria-label="섹션 선택">
          <option value="">전체 섹션</option>
        </select>
        <select id="styleFilter" aria-label="스타일 선택">
          <option value="">전체 스타일</option>
        </select>
      </div>
    </section>

    <section class="result-summary" aria-live="polite">
      <strong id="resultTitle">검색해 주세요</strong>
      <span id="resultCount"></span>
    </section>

    <section id="results" class="results">
      <div class="empty-state">백넘버, 선수명 또는 이벤트를 입력해 주세요.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
