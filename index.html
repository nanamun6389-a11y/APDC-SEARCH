<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>APDC Entry Search</title>
<style>
:root{--bg:#f7f7f5;--card:#fff;--ink:#111;--muted:#6b6b6b;--line:#e5e5e2;--accent:#111;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:#111;color:#fff;padding:28px 18px 24px}
.wrap{max-width:980px;margin:0 auto}
.brand{font-size:12px;letter-spacing:.22em;opacity:.75;font-weight:700}
h1{font-size:28px;line-height:1.15;margin:8px 0 6px}
.subtitle{font-size:14px;opacity:.72;margin:0}
.search-panel{background:#fff;margin:-2px auto 18px;padding:16px;border-radius:0 0 18px 18px;box-shadow:0 7px 20px rgba(0,0,0,.06)}
.search-grid{display:grid;grid-template-columns:1fr 180px auto;gap:10px}
.search-btn{border:0;background:#111;color:#fff;border-radius:12px;padding:0 22px;font-size:16px;font-weight:800;cursor:pointer;min-height:50px}
.search-btn:active{transform:translateY(1px)}
input,select{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:14px 13px;font-size:16px;outline:none}
input:focus,select:focus{border-color:#777;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.hint{font-size:12px;color:var(--muted);margin:10px 2px 0}
.summary{display:flex;justify-content:space-between;align-items:center;padding:2px 2px 10px;font-size:13px;color:var(--muted)}
.clear{border:0;background:none;text-decoration:underline;color:#444;cursor:pointer;font-size:13px}
.results{display:grid;gap:10px;padding:0 16px 30px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;box-shadow:0 2px 7px rgba(0,0,0,.025)}
.card-top{display:flex;gap:12px;align-items:flex-start}
.back{min-width:58px;height:58px;border-radius:14px;background:#111;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
.back small{font-size:9px;letter-spacing:.08em;opacity:.65}
.back strong{font-size:22px;line-height:1}
.name{font-size:17px;font-weight:800;margin:2px 0 4px}
.meta{font-size:13px;color:var(--muted)}
.event{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-weight:700;font-size:14px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.tag{font-size:11px;padding:5px 8px;border-radius:999px;background:#f1f1ef;color:#444}
.section-Amateur{background:#f5edff} .section-Under{background:#eaf5ff} .section-Over{background:#fff1e7}
.section-Formation{background:#efefef} .section-Rising{background:#eaf8e7} .section-Senior{background:#eaf7f2}
.empty{text-align:center;background:#fff;border:1px dashed #d6d6d2;border-radius:16px;padding:42px 16px;color:var(--muted)}
footer{text-align:center;color:#888;font-size:11px;padding:6px 16px 28px}
@media(max-width:650px){h1{font-size:24px}.search-grid{grid-template-columns:1fr}.search-btn{width:100%;padding:14px 18px}header{padding-top:22px}.card{padding:14px}}
</style>
</head>

<header><div class="wrap"><div class="brand">APDC 2026</div><h1>Asia Pacific Dancesport Championship</h1><p class="subtitle">선수 · 백넘버 · 경기 검색</p></div></header>
<main class="wrap">

  <div class="summary"><span id="count"></span><button id="clear" class="clear">검색 초기화</button></div>
  <section id="results" class="results"></section>
</main>

const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function sectionClass(s){for(const k of ['Amateur','Under','Over','Formation','Rising','Senior'])if(s.includes(k))return 'section-'+k;return '';}
function render(){
  const term=q.value.trim().toLowerCase(); const sv=sec.value;
  let filtered=DATA.filter(x=>{
    if(sv && x.section!==sv)return false;
    if(!term)return true;
    const hay=[x.eventNo,'event '+x.eventNo,x.section,x.style,x.division,x.event,x.backNo,x.name,x.entryType].join(' ').toLowerCase();
    return hay.includes(term);
  });
  filtered.sort((a,b)=>Number(a.backNo)-Number(b.backNo)||Number(a.eventNo)-Number(b.eventNo)||a.name.localeCompare(b.name));

  const max=300;

}
