<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>APDC Entry Search</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="eyebrow">2026 ASIA PACIFIC DANCESPORT CHAMPIONSHIP</div>
  <h1>APDC ENTRY SEARCH</h1>
  <p>Search by name, back number, event number, section, or event.</p>
</header>
<main>
  <section class="search-panel">
    <input id="searchInput" type="search" autocomplete="off" placeholder="Name / Back No. / Event No. / Event">
    <button id="clearBtn" type="button">CLEAR</button>
  </section>
  <div id="summary" class="summary"></div>
  <section id="results" class="results"></section>
</main>
<footer>APDC · Entry information may change until the entry deadline.</footer>
<script src="app.js"></script>
</body>
</html>
